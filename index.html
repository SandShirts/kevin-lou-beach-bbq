<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover,user-scalable=no" />
<title>Kevin and Lou's Beach BBQ</title>
<meta name="theme-color" content="#087f9c" />
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Inter:wght@400;600;700;800&display=swap');
:root{--navy:#063b4a;--deep:#07566b;--sea:#0aa6c2;--aqua:#55d6c8;--sand:#ffe8ad;--cream:#fffaf0;--coral:#f54f75;--sun:#ffd65c;--ink:#17333b;--muted:#61757b;--line:#ead8ad;--shadow:0 14px 32px rgba(4,62,76,.18)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;color:var(--ink);font-family:Inter,system-ui,sans-serif}body{overflow-x:hidden;background:#0b7088 url('busy-beach-background.png') center top/cover fixed no-repeat}body:before{content:"";position:fixed;z-index:0;inset:0;background:linear-gradient(180deg,rgba(3,42,53,.06) 0%,rgba(3,42,53,.12) 32%,rgba(255,232,173,.12) 100%);pointer-events:none}body:after{content:"";position:fixed;z-index:0;inset:0;background:linear-gradient(90deg,rgba(0,0,0,.05),transparent 45%,rgba(0,0,0,.05));pointer-events:none}.app{position:relative;z-index:1;max-width:560px;margin:auto;padding:12px 12px calc(28px + env(safe-area-inset-bottom))}.hero{text-align:center;padding:10px 8px 18px}.badge{display:inline-flex;gap:8px;align-items:center;background:rgba(255,255,255,.9);padding:8px 13px;border-radius:999px;font-size:13px;font-weight:800;color:var(--navy);box-shadow:0 7px 18px rgba(7,59,76,.18)}h1{font-family:'Baloo 2';font-size:37px;line-height:.98;margin:15px 0 3px;color:#fff;text-shadow:0 3px 0 rgba(4,74,90,.35),0 0 12px rgba(4,74,90,.16)}.card{background:rgba(255,250,240,.985);border:1px solid rgba(234,216,173,.96);border-radius:24px;padding:16px;margin:14px 0;box-shadow:var(--shadow);backdrop-filter:blur(5px)}
.stepbar{display:flex;align-items:center;gap:10px;margin:-3px 0 10px}.stepnum{display:flex;align-items:center;justify-content:center;min-width:78px;height:34px;border-radius:12px;background:linear-gradient(180deg,#ff6b8c,var(--coral));color:#fff;font-family:'Baloo 2';font-size:18px;font-weight:800;box-shadow:0 4px 0 #bb3151}.stepline{height:3px;flex:1;border-radius:99px;background:linear-gradient(90deg,var(--coral),var(--sun))}.card h2{font-family:'Baloo 2';font-size:24px;line-height:1.05;margin:3px 0 5px;color:var(--navy)}.hint{font-size:13px;color:var(--muted);margin:0 0 12px}.field{width:100%;font-size:17px;padding:15px;border:2px solid var(--line);border-radius:15px;background:white;margin-top:8px}.field:focus{outline:none;border-color:var(--sea);box-shadow:0 0 0 4px rgba(10,166,194,.15)}.fieldlabel{display:block;font-weight:800;font-size:14px;margin-top:12px;color:var(--deep)}.item{border-top:1px dashed var(--line);padding:13px 0}.item:first-of-type{border-top:0}.mainrow{display:flex;align-items:center;gap:9px}.ico{font-size:29px;width:35px;text-align:center}.label{flex:1;min-width:0}.label b{display:block;font-size:16px}.label small{color:var(--muted);font-size:12px}.stepper{display:flex;align-items:center;gap:6px}.stepper button{width:42px;height:42px;border:0;border-radius:13px;font-size:25px;font-weight:800;background:#eadfc5;color:var(--navy);cursor:pointer;touch-action:manipulation}.stepper button.plus{background:var(--coral);color:white;box-shadow:0 3px 0 #bd3453}.stepper button:active{transform:scale(.93)}.qty{width:26px;text-align:center;font-size:19px;font-weight:800}.tops{display:none;margin:10px 0 0 43px;background:#fff;border:1px solid var(--line);padding:11px;border-radius:14px}.tops.show{display:block;animation:drop .18s ease-out}.tops-title{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:800;margin-bottom:8px}.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{padding:9px 12px;border:1.5px solid var(--line);border-radius:999px;background:white;font-size:13px;font-weight:700;cursor:pointer;touch-action:manipulation}.chip.on{background:var(--aqua);border-color:var(--aqua);color:#073b4c}.yesno{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:9px}.yesno button{border:1.5px solid var(--line);background:#fff;border-radius:13px;padding:13px;font-weight:800;color:var(--ink);font-size:15px;touch-action:manipulation}.yesno button.on{background:var(--sea);border-color:var(--sea);color:#fff}.submit-dock{position:static;z-index:auto;padding:8px 0 calc(14px + env(safe-area-inset-bottom));background:transparent;backdrop-filter:none}.submit{display:block;max-width:536px;margin:0 auto;width:100%;border:0;border-radius:17px;padding:17px;font-family:'Baloo 2';font-size:21px;font-weight:800;background:linear-gradient(180deg,#ff698a,var(--coral));color:#fff;box-shadow:0 6px 0 #b92f51,0 10px 24px rgba(7,59,76,.24);cursor:pointer;touch-action:manipulation}.submit:active{transform:translateY(3px);box-shadow:0 3px 0 #b92f51}.submit-note{max-width:536px;margin:4px auto 0;text-align:center;color:#26464d;font-size:11px;font-weight:800;text-shadow:0 1px 0 #fff}.status{text-align:center;color:var(--muted);font-size:13px;margin-top:10px}.done{text-align:center;background:var(--cream);margin-top:70px;border-radius:26px;padding:32px 20px;box-shadow:var(--shadow)}.done .big{font-size:62px}.done h2{font-family:'Baloo 2';font-size:29px;color:var(--navy);margin:4px}.summary{text-align:left;background:#fff;border:1px solid var(--line);border-radius:16px;padding:13px;margin:18px 0;font-size:14px;line-height:1.55}.again{border:0;border-radius:14px;background:var(--sea);color:white;font-weight:800;padding:14px 18px;font-size:15px}.error{background:#fff0f3;border:1px solid #f2a1b4;color:#9e2445;padding:11px;border-radius:12px;margin:10px 0;font-size:13px;font-weight:700}.tiny{text-align:center;font-size:11px;color:#6b7f85;margin-top:15px}.other-wrap{display:none;margin:10px 0 0 43px;background:#fff;border:1px solid var(--line);padding:11px;border-radius:14px}.other-wrap.show{display:block;animation:drop .18s ease-out}.pizza-mark{display:inline-flex;align-items:center;justify-content:center;margin-left:8px;font-size:27px;vertical-align:middle;filter:drop-shadow(0 2px 1px rgba(0,0,0,.2))}.pizza-card{background:linear-gradient(135deg,#fff7d6,#ffe2e8);border:2px solid var(--coral);border-radius:18px;padding:18px;text-align:center;margin-top:12px;box-shadow:0 9px 22px rgba(185,47,81,.15);animation:drop .2s ease-out}.pizza-card .pizza-big{font-size:48px;line-height:1}.pizza-card b{display:block;font-family:'Baloo 2';font-size:24px;color:#9e2445;margin:7px 0 2px}.pizza-card p{margin:0;color:var(--ink);font-weight:800}.pizza-card small{display:block;margin-top:8px;color:var(--muted);font-weight:700}@keyframes drop{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}@media(max-width:600px){body{background-size:auto 100vh;background-position:center top;background-attachment:fixed}.app{padding-left:10px;padding-right:10px}.card{background:rgba(255,250,240,.97)}}@media(max-width:380px){h1{font-size:32px}.card{padding:14px}.stepper button{width:39px;height:39px}.ico{font-size:25px;width:31px}.label b{font-size:15px}}
</style>
</head>
<body><main class="app" id="app"></main>
<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwj4ini6YZjYRd8AhIUrLGt8DSo9vF-gbvuoCmRUgbZ0vgc0fXaJyMRah5RG-tdNmWM8A/exec";
const BURGER_TOPS=["Lettuce","Tomato","Onion","Pickles","Jalapeños","Avocado"];
const DOG_TOPS=["Onion","Pickles","Jalapeños"];
const GRILL=[
 {k:"burger",n:"Burger",i:"🍔",s:"No cheese",tops:BURGER_TOPS},
 {k:"cheeseburger",n:"Cheeseburger",i:"🍔",s:"1 cheese slice",tops:BURGER_TOPS},
 {k:"kielbasa",n:"Kielbasa",i:"🌭",s:"No cheese",tops:DOG_TOPS},
 {k:"kielbasa_cheese",n:"Kielbasa with cheese",i:"🌭",s:"½ cheese slice",tops:DOG_TOPS},
 {k:"turkey",n:"Turkey burger",i:"🦃",s:"No cheese",tops:BURGER_TOPS},
 {k:"turkey_cheese",n:"Turkey burger with cheese",i:"🦃",s:"1 cheese slice",tops:BURGER_TOPS},
 {k:"chicken",n:"Chicken burger",i:"🐔",s:"No cheese",tops:BURGER_TOPS},
 {k:"chicken_cheese",n:"Chicken burger with cheese",i:"🐔",s:"1 cheese slice",tops:BURGER_TOPS},
 {k:"hotdog",n:"Hot dog",i:"🌭",s:"No cheese",tops:DOG_TOPS},
 {k:"hotdog_cheese",n:"Hot dog with cheese",i:"🌭",s:"½ cheese slice",tops:DOG_TOPS},
 {k:"corn",n:"Corn on the cob",i:"🌽",s:"Off the grill",tops:[]}
];
const DRINKS=["Water","Propel","Coke","Diet Coke","Sprite","Beer","White Claw","Wine","Other"];
const SIDES=[
 {k:"cucumber_tomato",n:"Will you eat cucumber tomato salad?"},
 {k:"pasta",n:"Will you eat pasta salad?"},
 {k:"potato",n:"Will you eat potato salad?"},
 {k:"dessert",n:"Will you be eating dessert?"}
];
let state;
function reset(){state={name:"",email:"",grill:{},drinks:{},sides:{},otherDrink:"",pizza:null};GRILL.forEach(x=>state.grill[x.k]={qty:0,tops:{}});DRINKS.forEach(x=>state.drinks[x]=0);SIDES.forEach(x=>state.sides[x.k]=null)}
const app=document.getElementById('app');
function esc(s){return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function totalSelections(){return GRILL.reduce((a,x)=>a+state.grill[x.k].qty,0)+DRINKS.reduce((a,x)=>a+state.drinks[x],0)}
function stepHeader(n){return `<div class="stepbar"><div class="stepnum">STEP ${n}</div><div class="stepline"></div></div>`}
function stepper(type,key,val){return `<div class="stepper"><button type="button" data-step="${type}|${esc(key)}|-" aria-label="Decrease">−</button><span class="qty">${val}</span><button type="button" class="plus" data-step="${type}|${esc(key)}|+" aria-label="Increase">+</button></div>`}
function render(){
 app.innerHTML=`<section class="hero"><div class="badge">🏖️ BEACH DAY ORDER</div><h1>Kevin and Lou's<br>Beach BBQ <span class="pizza-mark" title="No pizza allowed">🚫🍕</span></h1></section>
 <section class="card">${stepHeader(1)}<h2>ENTER YOUR NAME</h2><label class="fieldlabel" for="name">Name</label><input class="field" id="name" autocomplete="name" placeholder="Enter your name" value="${esc(state.name)}"><label class="fieldlabel" for="email">Email address</label><input class="field" id="email" type="email" inputmode="email" autocomplete="email" placeholder="Enter your email for confirmation" value="${esc(state.email)}"><p class="hint" style="margin-top:8px">Optional. We will email you a copy of your order.</p></section>
 <section class="card">${stepHeader(2)}<h2>Choose your grill food</h2><p class="hint">Use + and −. Toppings appear after you add an item.</p>${GRILL.map(x=>itemHtml(x)).join('')}</section>
 <section class="card">${stepHeader(3)}<h2>Sides & dessert</h2>${SIDES.map(s=>`<div class="item"><div class="label"><b>${s.n}</b></div><div class="yesno"><button type="button" data-yn="${s.k}|yes" class="${state.sides[s.k]===true?'on':''}">Yes</button><button type="button" data-yn="${s.k}|no" class="${state.sides[s.k]===false?'on':''}">No</button></div></div>`).join('')}</section>
 <section class="card">${stepHeader(4)}<h2>Drinks</h2><p class="hint">Choose quantities for anything you expect to drink.</p>${DRINKS.map(d=>`<div class="item"><div class="mainrow"><span class="ico">${drinkIcon(d)}</span><span class="label"><b>${d}</b></span>${stepper('drink',d,state.drinks[d])}</div>${d==='Other'?`<div class="other-wrap ${state.drinks.Other>0?'show':''}"><label class="fieldlabel" for="otherDrink" style="margin-top:0">What other drink?</label><input class="field" id="otherDrink" placeholder="Example: Lemonade" value="${esc(state.otherDrink)}"></div>`:''}</div>`).join('')}</section>
 <section class="card">${stepHeader(5)}<h2>The important pizza question</h2><p class="hint">Would you rather we just order pizza because it is easier?</p><div class="yesno"><button type="button" data-pizza="no" class="${state.pizza===false?'on':''}">No — BBQ is better</button><button type="button" data-pizza="yes" class="${state.pizza===true?'on':''}">Yes — just get pizza</button></div>${state.pizza===true?`<div class="pizza-card"><div class="pizza-big">🚫🍕</div><b>No pizza for you.</b><p>You're an asshole.</p><small>We'll see you at the grill.</small></div>`:''}</section>
 <div id="msg"></div><div class="submit-dock"><button class="submit" id="submit">SUBMIT MY ORDER 🍽️</button><div class="submit-note">Complete Steps 1–5, then submit</div></div>`;
 wire();
}
function itemHtml(x){const c=state.grill[x.k];return `<div class="item"><div class="mainrow"><span class="ico">${x.i}</span><span class="label"><b>${x.n}</b><small>${x.s}</small></span>${stepper('grill',x.k,c.qty)}</div>${x.tops.length?`<div class="tops ${c.qty>0?'show':''}"><div class="tops-title">Toppings for ${x.n}</div><div class="chips">${x.tops.map(t=>`<button type="button" class="chip ${c.tops[t]?'on':''}" data-top="${x.k}|${t}">${t}${c.tops[t]?' ✓':''}</button>`).join('')}</div></div>`:''}</div>`}
function drinkIcon(d){return ({Water:'💧',Propel:'🧊',Coke:'🥤','Diet Coke':'🥤',Sprite:'🥤',Beer:'🍺','White Claw':'🥫',Wine:'🍷',Other:'🧃'})[d]||'🥤'}
function wire(){
 document.getElementById('name').oninput=e=>state.name=e.target.value;
 document.getElementById('email').oninput=e=>state.email=e.target.value;
 const other=document.getElementById('otherDrink');if(other)other.oninput=e=>state.otherDrink=e.target.value;
 document.querySelectorAll('[data-step]').forEach(b=>b.onclick=()=>{const [type,key,dir]=b.dataset.step.split('|');if(type==='grill')state.grill[key].qty=Math.max(0,Math.min(20,state.grill[key].qty+(dir==='+'?1:-1)));else state.drinks[key]=Math.max(0,Math.min(20,state.drinks[key]+(dir==='+'?1:-1)));render()});
 document.querySelectorAll('[data-top]').forEach(b=>b.onclick=()=>{const [k,t]=b.dataset.top.split('|');state.grill[k].tops[t]=!state.grill[k].tops[t];render()});
 document.querySelectorAll('[data-yn]').forEach(b=>b.onclick=()=>{const [k,v]=b.dataset.yn.split('|');state.sides[k]=v==='yes';render()});
 document.querySelectorAll('[data-pizza]').forEach(b=>b.onclick=()=>{state.pizza=b.dataset.pizza==='yes';render();if(state.pizza){setTimeout(()=>document.querySelector('.pizza-card')?.scrollIntoView({behavior:'smooth',block:'center'}),50)}});
 document.getElementById('submit').onclick=submit;
}
function validate(){if(!state.name.trim())return 'Please enter your name.';if(totalSelections()<1)return 'Please select at least one grill item or drink.';if(state.drinks.Other>0&&!state.otherDrink.trim())return 'Please tell us what the other drink is.';return ''}
function orderSummary(){const p=[];GRILL.forEach(x=>{const c=state.grill[x.k];if(c.qty){const t=Object.keys(c.tops).filter(k=>c.tops[k]);p.push(`${c.qty}× ${x.n}${t.length?' — '+t.join(', '):''}`)}});DRINKS.forEach(d=>{if(state.drinks[d])p.push(`${state.drinks[d]}× ${d}${d==='Other'&&state.otherDrink.trim()?' — '+state.otherDrink.trim():''}`)});SIDES.forEach(s=>{if(state.sides[s.k]===true)p.push(s.n.replace('Will you eat ','').replace('Will you be eating ','').replace('?',''))});return p}
async function submit(){
 const msg=document.getElementById('msg'),btn=document.getElementById('submit');const err=validate();if(err){msg.innerHTML=`<div class="error">${err}</div>`;msg.scrollIntoView({behavior:'smooth',block:'center'});return}
 if(!SCRIPT_URL.startsWith('https://script.google.com/')){msg.innerHTML='<div class="error">The website is in preview mode. The Google Sheet connection must be added before live orders can be submitted.</div>';return}
 btn.disabled=true;btn.textContent='SENDING…';
 const payload={name:state.name.trim(),email:state.email.trim(),submittedAt:new Date().toISOString(),grill:state.grill,drinks:state.drinks,sides:state.sides,otherDrink:state.otherDrink.trim(),pizzaChoice:state.pizza};
 try{await fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});showDone()}catch(e){btn.disabled=false;btn.textContent='SUBMIT MY ORDER 🍽️';msg.innerHTML='<div class="error">The order did not send. Check the connection and try again.</div>'}
}
function showDone(){const lines=orderSummary();app.innerHTML=`<section class="done"><div class="big">🏖️🍔</div><h2>Order submitted!</h2><p>Thanks, ${esc(state.name)}. Here is your order:</p><div class="summary">${lines.map(x=>`• ${esc(x)}`).join('<br>')}</div><button class="again" id="again">Add another order</button></section>`;document.getElementById('again').onclick=()=>{reset();render()}}
reset();render();
</script>
</body></html>
